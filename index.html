<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Waveyyent</title>
    <meta name="google-site-verification" content="JMz28gG8wKphz6gqiLqys27_pDw6SxZLsx5uDc2fzAk" />
    <link rel="icon" href="waveyLogo.jpeg" />

    <script src="https://cdn.tailwindcss.com">
    </script>
    <link
    href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;500;600;700&family=Great+Vibes&display=swap"
    rel="stylesheet"
    />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js">
    </script>
    <script src="https://js.paystack.co/v1/inline.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #050505;
            overflow-x: hidden;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: #fff;
        }

        h1,
        h2,
        h3,
        .font-display {
            font-family: "Clash Display", sans-serif;
        }

        .font-cursive {
            font-family: "Dancing Script", cursive;
        }

        .glass-nav {
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .text-glow {
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.25);
        }

        .card-3d {
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card-3d:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 60px -20px rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #000000;
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .section-padding {
            padding: 4rem 1rem;
        }

        @media (min-width: 768px) {
            .section-padding {
                padding: 6rem 2rem;
            }
        }

        @media (min-width: 1024px) {
            .section-padding {
                padding: 8rem 2rem;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        @keyframes subtleShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(-1.2px, 1.2px);
            }
            50% {
                transform: translate(0.9px, -0.6px);
            }
            75% {
                transform: translate(-0.6px, -0.9px);
            }
        }

        @keyframes brandEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.8);
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes brandExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
                filter: blur(4px);
            }
        }

        @keyframes ctaEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            50% {
                opacity: 0.5;
                transform: translateY(-5px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideFadeIn {
            0% {
                opacity: 0;
                transform: scale(1.08);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        .brand-entrance {
            animation: brandEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .brand-exit {
            animation: brandExit 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }
        .cta-entrance {
            animation: ctaEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .shop-shaky {
            animation: subtleShake 3.5s infinite;
        }

        #toast {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 85vw;
            width: auto;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (min-width: 768px) {
            #toast {
                bottom: 30px;
                right: 30px;
                left: auto;
                transform: translateX(0) translateY(150%);
            }
            #toast.show {
                transform: translateX(0) translateY(0);
            }
        }

        @media (min-width: 1024px) {
            #toast {
                bottom: 30px;
            }
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -12px;
            background: #ffffff;
            color: #000000;
            font-size: 0.6rem;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0 2px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 5;
        }

        @media (min-width: 1024px) {
            .cart-badge {
                top: -6px;
                right: -14px;
                min-width: 18px;
                height: 18px;
                font-size: 0.65rem;
            }
        }

        .product-card img,
        #main-product-image {
            filter: brightness(1.2) contrast(1.1);
            transition: filter 0.3s ease;
        }
        .product-card:hover img {
            filter: brightness(1.3) contrast(1.15);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 640px) {
            .product-grid {
                grid-template-columns: 1fr;
                max-width: 400px;
            }
        }

        .product-card {
            cursor: pointer;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: transparent;
            border: none;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 16px;
        }

        .product-card .hover-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0);
            transition: background 0.4s ease;
            border-radius: 16px;
            pointer-events: none;
        }

        .product-card:hover .hover-hint {
            background: rgba(0, 0, 0, 0.35);
        }

        .product-card .hover-hint span {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s ease;
            font-family: "Clash Display", sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .product-card:hover .hover-hint span {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card .aspect-portrait {
            aspect-ratio: 3/4;
            width: 100%;
        }

        /* Discount Badge */
        .discount-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: #ffffff;
            color: #000000;
            font-weight: 800;
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        @media (min-width: 768px) {
            .discount-badge {
                font-size: 0.75rem;
                padding: 7px 14px;
                top: 16px;
                left: 16px;
            }
        }

        /* Slideshow */
        .slideshow-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .slideshow-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .slideshow-slide.active {
            opacity: 1;
            animation: slideFadeIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .slideshow-slide.exiting {
            animation: slideFadeOut 0.8s ease forwards;
        }
        .slide-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .slide-dot.active {
            background: #ffffff;
            width: 24px;
            border-radius: 4px;
        }

        .cart-item-delete {
            cursor: pointer;
            transition: all 0.2s;
            color: #aaaaaa;
        }
        .cart-item-delete:hover {
            color: #ffffff;
            transform: scale(1.1);
        }
        .style-thumb {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            border-radius: 8px;
            overflow: hidden;
            opacity: 0.5;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }
        .style-thumb.active {
            border-color: #ffffff;
            opacity: 1;
        }
        .style-thumb:hover {
            opacity: 0.85;
            border-color: rgba(255, 255, 255, 0.5);
        }
        .quantity-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            user-select: none;
        }
        .quantity-btn:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .quantity-btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.92);
        }
        .quantity-display {
            width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            user-select: none;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 0;
        }
        .back-btn:hover {
            color: #fff;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.85rem;
            color: #aaa;
        }
        .info-row i {
            width: 20px;
            text-align: center;
            color: #fff;
            font-size: 0.9rem;
        }
        .checkout-step {
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .payment-method-card {
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        .payment-method-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        .payment-method-card.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        .payment-method-card .check-icon {
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }
        .payment-method-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        .success-animation {
            animation: successPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes successPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .account-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 8px 0;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: 0.2s ease;
            z-index: 60;
        }
        .account-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .account-dropdown button {
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            font-size: 0.9rem;
            color: #ccc;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .account-dropdown button:hover {
            background: #222;
            color: #fff;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-pending {
            background: rgba(234, 179, 8, 0.15);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        .status-confirmed {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .status-shipped {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        .status-delivered {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .nav-brand {
            font-family: "Dancing Script", cursive;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Auth Modal */
        .auth-close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1rem;
            z-index: 5;
        }
        .auth-close-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #fff;
        }

        @media (max-width: 1023px) {
            #desktop-nav {
                display: none !important;
            }
            #mobile-top-bar {
                display: flex !important;
            }
            main {
                padding-top: 60px !important;
                padding-bottom: 0 !important;
            }
        }
        @media (min-width: 1024px) {
            #desktop-nav {
                display: flex !important;
            }
            #mobile-top-bar {
                display: none !important;
            }
            #mobile-sidebar,
            #sidebar-overlay {
                display: none !important;
            }
            main {
                padding-top: 80px !important;
                padding-bottom: 0 !important;
            }
        }

        /* Mobile Sidebar */
        #mobile-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 300px;
            max-width: 80vw;
            background: #0a0a0a;
            z-index: 90;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.8);
            border-right: 1px solid #1a1a1a;
        }
        #mobile-sidebar.open {
            transform: translateX(0);
        }
        #sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 89;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }
        #sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            color: #aaa;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            text-transform: uppercase;
        }
        .sidebar-item:hover,
        .sidebar-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        .sidebar-item i {
            width: 22px;
            text-align: center;
            font-size: 1.1rem;
        }
        .sidebar-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .sidebar-close:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #fff;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Preloader -->
    <div id="preloader" style="position: fixed; inset: 0; background: #0a0a0a; z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s ease, visibility 0.5s ease;">
        <img src="preLogopreview.png" alt="Wavey.ent" style="width: 350px; height: 350px; object-fit: contain; animation: blink 1s infinite;" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1 style=font-family:Dancing Script,cursive;font-size:4rem;color:#fff;animation:blink 1s infinite;>Wavey.ent</h1>';" />
    </div>

    <!-- SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- MOBILE SIDEBAR -->
    <div id="mobile-sidebar">
        <button class="sidebar-close" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
        <div class="p-6 border-b border-gray-800 flex flex-col items-start gap-1 mt-2">
            <span class="font-cursive text-3xl font-bold text-white">Waveyy<span>.</span>ent</span>
            <span class="text-xs text-gray-500 tracking-wider">STREETWEAR REDEFINED</span>
        </div>
        <div class="flex-1 py-4 space-y-1">
            <button onclick="sidebarNavigate('home')" class="sidebar-item active" id="sidebar-home"><i class="fa-solid fa-house"></i> Home</button>
            <button onclick="sidebarNavigate('shop')" class="sidebar-item" id="sidebar-shop"><i class="fa-solid fa-shop"></i> Shop</button>
            <button onclick="sidebarNavigate('lookbook')" class="sidebar-item" id="sidebar-lookbook"><i class="fa-solid fa-images"></i> Lookbook</button>
            <button onclick="sidebarNavigate('contact')" class="sidebar-item" id="sidebar-contact"><i class="fa-solid fa-envelope"></i> Contact</button>
            <button onclick="sidebarNavigate('cart')" class="sidebar-item relative" id="sidebar-cart-btn">
                <i class="fa-solid fa-cart-shopping"></i> Cart
                <span id="sidebar-cart-badge" class="cart-badge hidden" style="position:static;margin-left:auto;">0</span>
            </button>
            <button onclick="sidebarNavigate('orders')" class="sidebar-item" id="sidebar-orders"><i class="fa-solid fa-box"></i> Orders</button>
        </div>
        <div class="p-4 border-t border-gray-800">
            <button onclick="sidebarLogout()" class="sidebar-item text-red-400 hover:text-red-300 w-full" id="sidebar-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
            <button onclick="sidebarLogin()" class="sidebar-item text-green-400 hover:text-green-300 w-full" id="sidebar-login" style="display:none;"><i class="fa-solid fa-user"></i> Login / Sign Up</button>
        </div>
    </div>

    <!-- DESKTOP NAVIGATION -->
    <nav id="desktop-nav" class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-gray-800 flex items-center justify-between px-6" style="height: 80px; display: none">
        <div class="flex items-center gap-5">

        function getDeliveryFee(country, subtotal, state = "", city = "") {
            if (subtotal >= 200000) return 0;
            // ABUAD / Ado Ekiti in Ekiti state = FREE delivery
            const cityLower = (city || "").toLowerCase();
            const stateLower = (state || "").toLowerCase();
            if (stateLower === "ekiti" && (cityLower.includes("ado") || cityLower.includes("abuad") || cityLower
                    .includes("ekiti"))) {
                return 0;
            }
            if (cityLower.includes("abuad") || cityLower.includes("ado ekiti")) {
                return 0;
            }
            if (country === "Nigeria") {
                const lowFeeStates = ["Lagos", "Abuja"];
                return lowFeeStates.includes(state) ? 6000 : 10000;
            }
            return 6000;
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector("i");
            if (input.type === "password") { input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash"); } else { input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye"); }

            document.getElementById("auth-content").innerHTML = `
            <button class="auth-close-btn" onclick="closeAuthModal()"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="font-display text-2xl mb-2">Reset Password</h2><p class="text-gray-400 text-sm mb-6">Enter your email to receive a reset link.</p>

        function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById("reset-email").value;
            auth.sendPasswordResetEmail(email).then(() => { showToast("Password reset email sent!");
                openAuthModal(); }).catch((err) => showToast(err.message));
        }

        function closeAuthModal() { document.getElementById("auth-modal").classList.add("hidden"); }

            e.preventDefault();
            const name = document.getElementById("register-name").value;
            const email = document.getElementById("register-email").value;
            const password = document.getElementById("register-password").value;
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCred) => userCred.user.updateProfile({ displayName: name }).then(() => db.collection(
                    "users").doc(userCred.user.uid).set({ name: name, email: email, createdAt: firebase.firestore
                        .FieldValue.serverTimestamp() })))
                .then(() => { closeAuthModal();
                    showToast("Account created! Welcome to Wavey.ent 🌊"); })
                .catch((err) => showToast(err.message));
        }

                  <button onclick="updateCartQuantity(${i},-1)" class="w-7 h-7 border border-gray-600 rounded text-xs hover:bg-gray-700">−</button>

                  <button onclick="updateCartQuantity(${i},1)" class="w-7 h-7 border border-gray-600 rounded text-xs hover:bg-gray-700">+</button>
                </div>
              </div>
              <button onclick="removeCartItem(${i})" class="cart-item-delete self-start mt-1"><i class="fa-solid fa-trash"></i></button>
            </div>`).join("");
            totalEl.innerText = "₦" + subtotal.toLocaleString();
        }

        function updateCartQuantity(index, change) {
            if (index < 0 || index >= cart.length) return;
            cart[index].quantity = (cart[index].quantity || 1) + change;
            if (cart[index].quantity < 1) cart.splice(index, 1);
            localStorage.setItem("wavey_cart", JSON.stringify(cart));
            updateCartUI();
            renderCartItems();
        }

        function removeCartItem(index) {
            if (index < 0 || index >= cart.length) return;
            cart.splice(index, 1);
            localStorage.setItem("wavey_cart", JSON.stringify(cart));
            updateCartUI();
            renderCartItems();
            showToast("Item removed");
        }

        function addToCartWithSize(id) {
            if (!currentUser) { openAuthModal(); return; }
            if (!selectedSize) return showToast("Please select a size");
            const p = products.find((x) => x.id === id);
            if (!p) return;
            const qty = selectedQuantity || 1;
            const discountedPrice = getDiscountedPrice(p.price);
            const idx = cart.findIndex((i) => i.id === id && i.size === selectedSize);
            if (idx !== -1) { cart[idx].quantity += qty; } else { cart.push({ ...p, price: discountedPrice,
                    originalPrice: p.price, quantity: qty, size: selectedSize }); }
            localStorage.setItem("wavey_cart", JSON.stringify(cart));
            updateCartUI();
            if (!document.getElementById("cart-drawer").classList.contains("hidden")) renderCartItems();
            showToast("Added to cart! 🛒");
            selectedQuantity = 1;
            const display = document.getElementById("product-quantity-display");
            if (display) display.textContent = "1";
            updateAddToCartButtonPrice();
        }

        // ==================== PRODUCT PAGE FUNCTIONS ====================
        function selectProductStyle(index) {
            currentStyleIndex = index;
            const p = products.find((x) => x.id === currentProductId);
            if (!p) return;
            const allStyles = p.styles || [p.image];
            const mainImg = document.getElementById("main-product-image");
            if (mainImg && allStyles[index]) mainImg.src = allStyles[index];
            document.querySelectorAll(".style-thumb").forEach((el, i) => el.classList.toggle("active", i === index));
        }

        function selectProductSize(size, element) {
            selectedSize = size;
            document.querySelectorAll(".sz-btn").forEach((b) => { b.classList.remove("bg-white/10", "border-white",
                    "text-white");
                b.classList.add("border-gray-600", "text-white"); });
            if (element) { element.classList.add("bg-white/10", "border-white", "text-white");
                element.classList.remove("border-gray-600"); }
            updateAddToCartButtonPrice();
        }

        function changeProductQuantity(change) {
            selectedQuantity = Math.max(1, selectedQuantity + change);
            const display = document.getElementById("product-quantity-display");
            if (display) display.textContent = selectedQuantity;
            updateAddToCartButtonPrice();
        }

        function updateAddToCartButtonPrice() {
            const p = products.find((x) => x.id === currentProductId);
            if (!p) return;
            const discounted = getDiscountedPrice(p.price);
            const btn = document.getElementById("add-to-cart-btn");
            if (btn) btn.textContent = `Add to Cart — ₦${(discounted * selectedQuantity).toLocaleString()}`;
        }

        function navigateToProduct(id) { appRouter("product", id); }

        // ==================== CHECKOUT FUNCTIONS ====================
        function openCheckoutModal() {
            if (!currentUser) { openAuthModal(); return; }
            if (cart.length === 0) return showToast("Your cart is empty");
            checkoutStep = 1;
            checkoutCustomerData = {};
            document.getElementById("checkout-modal").classList.remove("hidden");
            renderCheckoutStep1();
        }

        function closeCheckoutModal() { document.getElementById("checkout-modal").classList.add("hidden");
            checkoutStep = 1; }

        function updateStateDropdown(countrySelect) {
            const country = countrySelect.value;
            const stateSelect = document.querySelector('#checkout-container select[name="state"]');
            const stateLabel = document.getElementById("state-label");
            if (!stateSelect) return;
            const states = getStatesForCountry(country);
            const defaultState = getDefaultState(country);
            stateSelect.innerHTML = states.map((s) =>
                `<option value="${s}" ${s === defaultState ? "selected" : ""}>${s}</option>`).join("");
            if (stateLabel) {
                stateLabel.textContent = "State";
            }
            updateCheckoutPreview();
        }

        function updateCheckoutPreview() {
            const countrySelect = document.querySelector('#checkout-container select[name="country"]');
            const stateSelect = document.querySelector('#checkout-container select[name="state"]');
            const cityInput = document.querySelector('#checkout-container input[name="city"]');
            if (!countrySelect || !stateSelect) return;
            const country = countrySelect.value,
                state = stateSelect.value;
            const city = cityInput ? cityInput.value : "";
            const subtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const delivery = getDeliveryFee(country, subtotal, state, city);
            const total = subtotal + vat + delivery;
            const deliveryPreview = document.getElementById("delivery-preview");
            const totalPreview = document.getElementById("total-preview");
            const abuadNote = document.getElementById("abuad-note");
            if (deliveryPreview) deliveryPreview.textContent = "₦" + delivery.toLocaleString();
            if (totalPreview) totalPreview.textContent = "₦" + total.toLocaleString();
            if (abuadNote) {
                abuadNote.style.display = (delivery === 0 && (state.toLowerCase() === "ekiti" || city.toLowerCase()
                    .includes("abuad") || city.toLowerCase().includes("ado"))) ? "block" : "none";
            }
        }

        function renderCheckoutStep1() {
            const subtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const stateOptions = nigeriaStates.map((s) =>
                `<option value="${s}" ${s === "Lagos" ? "selected" : ""}>${s}</option>`).join("");
            document.getElementById("checkout-container").innerHTML = `
            <div class="flex items-center justify-between mb-4"><h2 class="font-display text-xl">Shipping Information</h2><button onclick="closeCheckoutModal()" class="text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="checkout-step">
              <form onsubmit="goToCheckoutStep2(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">First Name *</label><input type="text" name="firstName" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="John"></div>
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Last Name *</label><input type="text" name="lastName" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="Doe"></div>
                </div>
                <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Country/Region *</label><select name="country" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" onchange="updateStateDropdown(this)"><option value="Nigeria">Nigeria</option></select></div>
                <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Address *</label><input type="text" name="address" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="Street address"></div>
                <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Apartment, suite, etc. (optional)</label><input type="text" name="apartment" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="Apt, suite, unit"></div>
                <div class="grid grid-cols-2 gap-4">
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">City *</label><input type="text" name="city" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="e.g. Ado Ekiti" oninput="updateCheckoutPreview()"></div>
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block"><span id="state-label">State</span> *</label><select name="state" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" onchange="updateCheckoutPreview()">${stateOptions}</select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Postal code (optional)</label><input type="text" name="postalCode" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white"></div>
                  <div><label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Phone *</label><input type="tel" name="phone" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg text-white" placeholder="+234 800 000 0000"></div>
                </div>
                <div id="abuad-note" style="display:none;" class="bg-green-900/20 border border-green-700/30 rounded-lg p-3 text-sm text-green-300 flex items-center gap-2">
                  <i class="fa-solid fa-truck-fast"></i> 🎓 Free delivery to ABUAD / Ado Ekiti!
                </div>
                <div class="bg-gray-800/50 p-4 rounded-lg space-y-2">
                  <div class="flex justify-between text-sm"><span>Subtotal (${cart.reduce((s, i) => s + (i.quantity || 0), 0)} items)</span><span>₦${subtotal.toLocaleString()}</span></div>
                  <div class="flex justify-between text-sm"><span>VAT (7.5%)</span><span>₦${vat.toLocaleString()}</span></div>
                  <div class="flex justify-between text-sm"><span>Delivery</span><span id="delivery-preview">₦${getDeliveryFee("Nigeria", subtotal, "Lagos").toLocaleString()}</span></div>
                  <div class="flex justify-between font-bold text-lg border-t border-gray-700 pt-2"><span>Total</span><span id="total-preview">₦${(subtotal + vat + getDeliveryFee("Nigeria", subtotal, "Lagos")).toLocaleString()}</span></div>
                </div>
                <button type="submit" class="w-full btn-primary text-black py-4 rounded-xl font-bold text-lg">Continue to Payment</button>
              </form>
            </div>`;
            setTimeout(() => updateCheckoutPreview(), 50);
        }

        function goToCheckoutStep2(e) {
            e.preventDefault();
            const f = e.target;
            checkoutCustomerData = {
                firstName: f.firstName.value,
                lastName: f.lastName.value,
                country: f.country.value,
                address: f.address.value,
                apartment: f.apartment.value || "",
                city: f.city.value,
                state: f.state.value,
                postalCode: f.postalCode.value || "",
                phone: f.phone.value,
                email: currentUser?.email || "",
                name: `${f.firstName.value} ${f.lastName.value}`,
            };
            checkoutStep = 2;
            renderCheckoutStep2();
            document.getElementById("checkout-container").scrollTop = 0;
        }

        function renderCheckoutStep2() {
            const subtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const delivery = getDeliveryFee(checkoutCustomerData.country, subtotal, checkoutCustomerData.state,
                checkoutCustomerData.city);
            const total = subtotal + vat + delivery;
            document.getElementById("checkout-container").innerHTML = `
            <div class="flex items-center justify-between mb-4"><h2 class="font-display text-xl">Payment</h2><button onclick="closeCheckoutModal()" class="text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="checkout-step">
              <div class="bg-gray-800/30 rounded-xl p-4 mb-6">
                <div class="flex justify-between text-sm mb-1"><span class="text-gray-400">Ship to:</span><span class="text-white">${checkoutCustomerData.name}</span></div>
                <div class="text-xs text-gray-500">${checkoutCustomerData.address}, ${checkoutCustomerData.city}, ${checkoutCustomerData.state}, ${checkoutCustomerData.country}</div>
                ${delivery === 0 ? '<div class="text-xs text-green-400 mt-1"><i class="fa-solid fa-check-circle"></i> Free Delivery</div>' : ""}
                <div class="flex justify-between font-bold mt-3 pt-3 border-t border-gray-700"><span>Total</span><span>₦${total.toLocaleString()}</span></div>
              </div>
              <p class="text-sm text-gray-400 uppercase tracking-wider mb-4">Payment via Paystack</p>
              <div class="payment-method-card selected mb-6" id="pm-paystack">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-800 rounded-lg flex items-center justify-center"><i class="fa-solid fa-credit-card text-white"></i></div><div><p class="font-bold">Paystack</p><p class="text-xs text-gray-400">Card, Bank Transfer, USSD</p></div></div>
                  <div class="check-icon w-6 h-6 bg-white rounded-full flex items-center justify-center" style="opacity:1;transform:scale(1);"><i class="fa-solid fa-check text-black text-xs"></i></div>
                </div>
              </div>
              <div class="flex gap-3">
                <button onclick="goBackToCheckoutStep1()" class="btn-outline text-white py-3 px-6 rounded-xl font-bold">Back</button>
                <button onclick="processPayment()" class="flex-1 btn-primary text-black py-4 rounded-xl font-bold text-lg">Pay ₦${total.toLocaleString()}</button>
              </div>
            </div>`;
        }

        function goBackToCheckoutStep1() { checkoutStep = 1;
            renderCheckoutStep1();
            document.getElementById("checkout-container").scrollTop = 0; }

        function processPayment() {
            const subtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const delivery = getDeliveryFee(checkoutCustomerData.country, subtotal, checkoutCustomerData.state,
                checkoutCustomerData.city);
            const total = subtotal + vat + delivery;
            const ref = "WVY_" + Date.now();
            showToast("Opening Paystack...");
            try {
                PaystackPop.setup({
                    // key: "pk_test_3e2b0630ceccd8cd2f5dae7998ee3638c7f780a3",
                    key: "pk_live_81d038e46cdd3c588ff397c9a65fb1fd24bcc17d",
                    email: checkoutCustomerData.email,
                    amount: total * 100,
                    currency: "NGN",
                    ref: ref,
                    callback: (r) => handlePaymentSuccess(total, ref, r.reference),
                    onClose: () => showToast("Payment cancelled"),
                }).openIframe();
            } catch (err) { showToast("Could not open Paystack."); }
        }

        function handlePaymentSuccess(total, ref, paymentRef) {
            const orderItems = cart.map((item) => ({ name: item.name, price: item.price, quantity: item.quantity || 1,
                size: item.size, image: item.image, originalPrice: item.originalPrice || item.price }));
            const subtotal = orderItems.reduce((s, i) => s + i.price * i.quantity, 0);
            const vat = Math.round(subtotal * VAT_RATE);
            const delivery = getDeliveryFee(checkoutCustomerData.country, subtotal, checkoutCustomerData.state,
                checkoutCustomerData.city);
            const orderData = {
                userId: currentUser?.uid || "guest",
                userEmail: currentUser?.email || checkoutCustomerData.email,
                customer: { ...checkoutCustomerData },
                items: orderItems,
                subtotal,
                vat,
                delivery,
                total,
                reference: ref,
                paymentRef,
                paymentMethod: "paystack",
                status: "pending",
                discount: "20%",
                tracking: [{ status: "pending", timestamp: new Date().toISOString(), note: "Order placed" }],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            };
            saveOrderToFirestore(orderData, orderItems, total, ref).finally(() => {
                closeCheckoutModal();
                document.getElementById("cart-panel")?.classList.add("translate-x-full");
                setTimeout(() => document.getElementById("cart-drawer")?.classList.add("hidden"), 300);
            });
        }

        async function saveOrderToFirestore(orderData, orderItems, total, ref) {
            try {
                await db.collection("orders").add(orderData);
                cart = [];
                localStorage.setItem("wavey_cart", JSON.stringify(cart));
                updateCartUI();
                showSuccessPage({ reference: ref, customer: orderData.customer, items: orderItems, total, error: null });
            } catch (error) {
                console.warn("Firestore save failed, using localStorage backup:", error.message);
                const backupOrders = JSON.parse(localStorage.getItem("wavey_backup_orders") || "[]");
                backupOrders.push({ ...orderData, createdAt: new Date().toISOString(), id: ref });
                localStorage.setItem("wavey_backup_orders", JSON.stringify(backupOrders));
                cart = [];
                localStorage.setItem("wavey_cart", JSON.stringify(cart));
                updateCartUI();
                showSuccessPage({ reference: ref, customer: orderData.customer, items: orderItems, total, error: null });
            }
        }

        function showSuccessPage(orderData) {
            const page = document.getElementById("success-page"),
                content = document.getElementById("success-page-content");
            if (!page || !content) { showToast("Order placed! Ref: " + orderData.reference); return; }
            content.innerHTML = `
            <div class="success-animation">
              <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-check text-black text-4xl"></i></div>
              <h1 class="font-display text-3xl font-bold mb-2">Payment Successful! 🎉</h1>
              <p class="text-gray-400 mb-2">Thank you, ${orderData.customer.name}!</p>
              <p class="text-sm text-gray-500 mb-8">Ref: <span class="text-white font-bold">#${orderData.reference}</span></p>
              <div class="bg-[#0a0a0a] border border-gray-800 rounded-2xl p-6 mb-6 text-left">
                <h3 class="font-bold text-lg mb-4">Order Summary</h3>
                <div class="space-y-2">${orderData.items.map((item) => `<div class="flex justify-between text-sm"><span>${item.name} x${item.quantity}</span><span>₦${(item.price * item.quantity).toLocaleString()}</span></div>`).join("")}</div>
                <div class="border-t border-gray-800 pt-2 mt-2"><div class="flex justify-between font-bold"><span>Total</span><span>₦${orderData.total.toLocaleString()}</span></div></div>
              </div>
              <button onclick="closeSuccessPageAndGoToShop()" class="w-full btn-primary text-black py-4 rounded-xl font-bold text-lg">🛍️ Continue Shopping</button>
            </div>`;
            page.classList.remove("hidden");
            window.scrollTo(0, 0);
        }

        function closeSuccessPageAndGoToShop() { document.getElementById("success-page").classList.add("hidden");
            appRouter("shop"); }

        // ==================== OWNER DASHBOARD ====================

            }, (err) => { console.error(err);
                document.getElementById("dashboard-orders").innerHTML =
                    `<p class="text-red-400 p-4">Error: ${err.message}</p>`; });
        }

        function deleteOrderAsOwner(orderId) {
            if (!currentUser || currentUser.email !== OWNER_EMAIL) { showToast("Only the owner can delete orders."); return; }
            if (!confirm("Delete this order permanently? This action cannot be undone.")) return;
            db.collection("orders").doc(orderId).delete()
                .then(() => showToast("✅ Order deleted permanently"))
                .catch(err => showToast("Error: " + err.message));
        }

        function updateOwnerOrderStatus(orderId, newStatus) {
            const note = { confirmed: "Order confirmed", shipped: "Order shipped", delivered: "Order delivered" } [
                newStatus
            ] || `Order ${newStatus}`;
            db.collection("orders").doc(orderId).update({
                status: newStatus,
                tracking: firebase.firestore.FieldValue.arrayUnion({ status: newStatus, timestamp: new Date()
                        .toISOString(), note })
            }).then(() => showToast(`✅ Order marked as ${newStatus}`)).catch((err) => showToast("Error: " + err
                .message));
        }

        function closeOwnerDashboard() {
            if (ownerDashboardUnsubscribe) { ownerDashboardUnsubscribe();
                ownerDashboardUnsubscribe = null; }
            document.getElementById("owner-modal").classList.add("hidden");
        }

        // ==================== SLIDESHOW ====================
        function startSlideshow() {
            stopSlideshow();
            const slides = document.querySelectorAll(".slideshow-slide");
            const dots = document.querySelectorAll(".slide-dot");
            if (slides.length === 0) return;
            currentSlideIndex = 0;
            slides.forEach((s, i) => { s.classList.remove("active", "exiting");
                if (i === 0) s.classList.add("active"); });
            if (dots.length > 0) dots.forEach((d, i) => d.classList.toggle("active", i === 0));
            slideshowInterval = setInterval(() => {
                const currentSlides = document.querySelectorAll(".slideshow-slide");
                const currentDots = document.querySelectorAll(".slide-dot");
                if (currentSlides.length === 0) { stopSlideshow(); return; }
                const activeSlide = document.querySelector(".slideshow-slide.active");
                if (activeSlide) activeSlide.classList.add("exiting");
                currentSlideIndex = (currentSlideIndex + 1) % currentSlides.length;
                setTimeout(() => {
                    currentSlides.forEach((s, i) => { s.classList.remove("active", "exiting");
                        if (i === currentSlideIndex) s.classList.add("active"); });
                    if (currentDots.length > 0) currentDots.forEach((d, i) => d.classList.toggle(
                        "active", i === currentSlideIndex));
                }, 400);
            }, 4500);
        }

        function stopSlideshow() {
            if (slideshowInterval) { clearInterval(slideshowInterval);
                slideshowInterval = null; }
        }

        function goToSlide(index) {
            stopSlideshow();
            const slides = document.querySelectorAll(".slideshow-slide");
            const dots = document.querySelectorAll(".slide-dot");
            if (slides.length === 0) return;
            const activeSlide = document.querySelector(".slideshow-slide.active");
            if (activeSlide) activeSlide.classList.add("exiting");
            currentSlideIndex = index;
            setTimeout(() => {
                slides.forEach((s, i) => { s.classList.remove("active", "exiting");
                    if (i === currentSlideIndex) s.classList.add("active"); });
                if (dots.length > 0) dots.forEach((d, i) => d.classList.toggle("active", i === currentSlideIndex));
            }, 400);
            startSlideshow();
        }

        // ==================== ROUTER ====================
        function appRouter(view, param) {
            if (myOrdersUnsubscribe) { myOrdersUnsubscribe();
                myOrdersUnsubscribe = null; }
            if (heroTransitionTimeout) { clearTimeout(heroTransitionTimeout);
                heroTransitionTimeout = null; }
            stopSlideshow();
            window._currentView = view;
            const app = document.getElementById("app");
            window.scrollTo(0, 0);

            if (view === "home") {
                app.innerHTML = renderHome();
                heroTransitionTimeout = setTimeout(() => {
                    const heroBrand = document.getElementById("hero-brand");
                    const heroCta = document.getElementById("hero-cta-wrapper");
                    if (heroBrand) heroBrand.classList.add("brand-exit");
                    if (heroCta) { heroCta.classList.remove("opacity-0", "pointer-events-none");
                        heroCta.classList.add("cta-entrance"); }
                }, 4000);
                setTimeout(startSlideshow, 100);
            } else if (view === "shop") {
                app.innerHTML = renderShop();
            } else if (view === "lookbook") {
                app.innerHTML = renderLookbook();
            } else if (view === "contact") {
                app.innerHTML = renderContact();
            } else if (view === "orders") {
                if (!currentUser) { openAuthModal(); return; }
                app.innerHTML =
                    `<div class="section-padding max-w-4xl mx-auto"><h2 class="font-display text-3xl font-bold mb-8">📦 My Orders</h2><div id="my-orders-list"><div class="text-center py-12"><i class="fa-solid fa-spinner fa-spin text-3xl text-gray-500 mb-4"></i></div></div></div>`;
                loadMyOrders();
            } else if (view === "product" && param) {
                app.innerHTML = renderProductPage(param);
            }
            updateSidebarActive();
        }

        // ==================== PAGE RENDERERS ====================
          function renderHome() {
            const slideImgs = slideshowImages.map((img, i) => `
                <div class="slideshow-slide ${i === 0 ? 'active' : ''}" style="background-image: url('${img}');"></div>
            `).join("");
            return `
            <section class="relative min-h-screen flex items-center justify-center overflow-hidden" id="home-hero">
              <!-- LIGHTER overlay for better image visibility -->
              <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/30 to-black/60 z-[1]"></div>
              <div class="slideshow-container">
                ${slideImgs}
              </div>
              <div class="relative z-20 text-center px-4">
                <h1 class="font-cursive text-6xl sm:text-8xl lg:text-9xl font-bold mb-6 text-glow brand-entrance" id="hero-brand" style="font-family: 'Dancing Script', cursive; text-shadow: 0 0 60px rgba(255,255,255,0.35), 0 0 120px rgba(255,255,255,0.15);">Waveyy<span style="color:#fff;">.</span>ent</h1>
                <div class="mt-8 opacity-0 pointer-events-none transition-all duration-500" id="hero-cta-wrapper">
                  <button onclick="appRouter('shop')" class="relative px-10 py-4 rounded-full border border-white/60 text-white backdrop-blur-md transition-all duration-300 hover:scale-110 hover:border-white overflow-hidden group">
                    <span class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent opacity-0 group-hover:opacity-100 transition duration-500"></span>
                    <span class="relative text-3xl tracking-wide" style="font-family: 'Great Vibes', cursive;">Shop</span>
                  </button>
                </div>
                <!-- NO DOTS -->
              </div>
              
            </section>
            <section class="bg-black text-white border-t border-gray-800 pt-16 pb-16 lg:pb-8 px-4">
              <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 mb-12">
                <div class="col-span-2 md:col-span-1"><h3 class="font-cursive text-3xl font-bold mb-4">Wavey<span>.</span>ent</h3><p class="text-gray-400 text-sm">Redefining streetwear.</p></div>
                <div><h4 class="font-bold mb-3">Shop</h4><ul class="space-y-2 text-gray-400 text-sm"><li><a onclick="appRouter('shop')" class="hover:text-white cursor-pointer">Products</a></li></ul></div>
                <div><h4 class="font-bold mb-3">Support</h4><ul class="space-y-2 text-gray-400 text-sm"><li><a onclick="appRouter('contact')" class="hover:text-white cursor-pointer">Contact</a></li><li class="text-gray-500">📞 ${PHONE_NUMBER}</li></ul></div>
                <div><h4 class="font-bold mb-3">Updates</h4><form onsubmit="event.preventDefault();showToast('Subscribed! 🌊')" class="flex"><input type="email" placeholder="Email" class="flex-1 px-4 py-2 bg-black border border-gray-600 rounded-l text-white text-sm"><button class="bg-white text-black px-4 py-2 rounded-r font-bold">→</button></form></div>
              </div>
              <div class="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">© 2026 Wavey.ent</div>
            </section>`;
        }

        function renderShop() {
            return `<div class="section-padding max-w-7xl mx-auto"><div class="product-grid relative z-10">${products.map((p) => {
            const discounted = getDiscountedPrice(p.price);
            return `<div class="product-card card-3d shop-shaky" onclick="navigateToProduct(${p.id})">
              <span class="discount-badge">20% OFF</span>
              <div class="aspect-portrait"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/600x800/1a1a1a/fff?text=?'"></div>
              <div class="hover-hint"><span>View</span></div>
              <div class="absolute bottom-3 left-3 right-3 z-10 pointer-events-none">
              </div>
            </div>`;
          }).join("")}</div></div>`;
        }

        function renderLookbook() {
            return `<div class="section-padding max-w-7xl mx-auto"><h2 class="font-display text-4xl font-bold mb-8 text-center">THE LOOKBOOK</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${lookbook.map((i) => `<div class="rounded-2xl overflow-hidden border border-gray-800"><img src="${i}" class="w-full h-full object-cover aspect-[3/4]" onerror="this.src='https://placehold.co/400x600/1a1a1a/fff?text=Look'"></div>`).join("")}</div></div>`;
        }

        function renderContact() {
            return `<div class="section-padding max-w-4xl mx-auto text-center"><h2 class="font-display text-4xl font-bold mb-6">CONTACT</h2><p class="text-gray-400 mb-6">📞 ${PHONE_NUMBER}</p><a href="https://wa.me/234${PHONE_NUMBER.replace(/^0/,'')}" target="_blank" class="btn-primary text-black px-8 py-4 rounded-full font-bold inline-flex items-center gap-2"><i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp</a></div>`;
        }

        function renderProductPage(id) {
            const p = products.find((x) => x.id === id);
            if (!p) return `<div class="section-padding text-center mt-20"><h2>Product not found</h2><button onclick="appRouter('shop')" class="btn-outline mt-4">Back to Wave</button></div>`;
            currentProductId = id;
            currentStyleIndex = 0;
            selectedSize = p.sizes.length > 0 ? p.sizes[0] : "";
            selectedQuantity = 1;
            const allStyles = p.styles || [p.image];
            const discounted = getDiscountedPrice(p.price);
            const youSave = p.price - discounted;
            return `
            <div class="section-padding max-w-7xl mx-auto">
              <div class="mb-6"><button onclick="appRouter('shop')" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Wave</button></div>
              <div class="flex flex-col md:flex-row gap-8">
                <div class="w-full md:w-7/12">
                  <div class="aspect-[3/4] bg-black rounded-2xl overflow-hidden relative">
                    <img src="${allStyles[0]}" alt="${p.name}" class="w-full h-full object-cover" id="main-product-image" onerror="this.src='https://placehold.co/600x800/1a1a1a/fff?text=?'">
                    <span class="discount-badge" style="top:12px;left:12px;">20% OFF</span>
                    ${allStyles.length > 1 ? `<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 bg-black/50 backdrop-blur-md rounded-full px-3 py-2">${allStyles.map((s, i) => `<button onclick="selectProductStyle(${i})" class="style-thumb ${i === 0 ? "active" : ""}"><img src="${s}" class="w-full h-full object-cover"></button>`).join("")}</div>` : ""}
                  </div>
                </div>
                <div class="w-full md:w-5/12">
                  <h1 class="font-display text-3xl font-bold mb-2">${p.name}</h1>
                  <div class="flex items-center gap-3 mb-4">
                    <span class="text-gray-400 line-through text-xl">₦${p.price.toLocaleString()}</span>
                    <span class="text-white text-3xl font-bold">₦${discounted.toLocaleString()}</span>
                    <span class="bg-white text-black text-xs font-bold px-3 py-1 rounded-full">SAVE ₦${youSave.toLocaleString()}</span>
                  </div>
                  <p class="text-gray-400 text-sm mb-6">${p.description || "Essential streetwear piece."}</p>
                  <div class="bg-gray-900/50 border border-gray-700 rounded-xl p-3 mb-5 flex items-start gap-3">
                    <i class="fa-solid fa-hand-sparkles text-white text-lg mt-1"></i>
                    <div>
                      <p class="text-sm font-bold text-white">Wash Care</p>
                      <p class="text-xs text-gray-300">Wash with mild liquid soap or bar soap. <strong class="text-white">Avoid detergents</strong> – they can damage the print and fabric.</p>
                    </div>
                  </div>
                  <div class="mb-5"><p class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Size</p><div class="flex flex-wrap gap-2">${p.sizes.map((s) => `<button onclick="selectProductSize('${s}',this)" class="sz-btn border px-5 py-3 rounded-full font-bold text-sm transition-all ${s === selectedSize ? "bg-white/10 border-white text-white" : "border-gray-600 text-white hover:border-white"}">${s}</button>`).join("")}</div></div>
                  <div class="mb-6"><p class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Quantity</p><div class="flex items-center gap-3"><button onclick="changeProductQuantity(-1)" class="quantity-btn">−</button><span class="quantity-display" id="product-quantity-display">1</span><button onclick="changeProductQuantity(1)" class="quantity-btn">+</button></div></div>
                  <button onclick="addToCartWithSize(${p.id})" class="w-full btn-primary text-black py-4 rounded-xl font-bold text-lg mb-6" id="add-to-cart-btn">Add to Cart — ₦${(discounted * selectedQuantity).toLocaleString()}</button>
                  <div class="space-y-0 mt-6">
                    <div class="info-row"><i class="fa-solid fa-truck-fast"></i><span>Ships in 7–10 business days</span></div>
                    <div class="info-row"><i class="fa-solid fa-shield-halved"></i><span>Secure checkout via Paystack</span></div>
                    <div class="info-row"><i class="fa-solid fa-tag"></i><span>Free shipping over ₦200,000</span></div>
                    <div class="info-row"><i class="fa-solid fa-graduation-cap"></i><span>🎓 Free delivery to ABUAD (Ado Ekiti)</span></div>
                  </div>
                </div>
              </div>
            </div>`;
        }

        // ==================== ORDERS ====================
        function loadMyOrders() {
            if (!currentUser) return;
            if (myOrdersUnsubscribe) myOrdersUnsubscribe();
            myOrdersUnsubscribe = db.collection("orders").where("userEmail", "==", currentUser.email).orderBy("createdAt",
                "desc").onSnapshot((snap) => {
                const container = document.getElementById("my-orders-list");
                if (!container) return;
                if (snap.empty) { container.innerHTML =
                        '<p class="text-center py-12 text-gray-400">No orders yet.</p>'; return; }
                container.innerHTML = snap.docs.map((d) => {
                    const o = d.data();
                    const isDelivered = o.status === "delivered";
                    return `<div class="bg-[#0a0a0a] rounded-2xl border border-gray-800 overflow-hidden mb-4">
            <div class="p-4 border-b border-gray-800 flex justify-between items-start">
              <div>
                <p class="font-bold text-white font-mono">#${o.reference || "N/A"}</p>
                <p class="text-xs text-gray-500">${formatDate(o.createdAt)}</p>
              </div>
              <div class="flex items-center gap-2">
                <span class="status-badge ${getStatusClass(o.status)}">${o.status || "pending"}</span>
                ${isDelivered ? `<button onclick="deleteMyOrder('${d.id}')" class="text-red-400 hover:text-red-300 transition-colors p-1" title="Delete Order"><i class="fa-solid fa-trash-can"></i></button>` : ""}
              </div>
            </div>
            <div class="px-4 pb-3 pt-3 space-y-2">
              ${(o.items || []).map((item) => `
              <div class="flex items-center gap-3 bg-black/30 rounded-xl p-2">
                <img src="${item.image}" class="w-12 object-cover rounded-lg" style="height:60px;" onerror="this.src='https://placehold.co/48x60/1a1a1a/fff?text=?'">
                <div class="flex-1"><p class="font-bold text-sm">${item.name}</p><p class="text-xs text-gray-400">Size: ${item.size} · Qty: ${item.quantity}</p></div>
                <p class="text-sm font-bold">₦${(item.price * item.quantity).toLocaleString()}</p>
              </div>`).join("")}
            </div>
            ${(o.tracking || []).length > 0 ? `
            <div class="px-4 pb-2">
              <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Tracking</p>
              <div class="space-y-1.5">
                ${o.tracking.map((t, i) => {
                  const isLast = i === o.tracking.length - 1;
                  return `<div class="flex items-start gap-2">
                    <div class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${isLast ? 'bg-white' : 'bg-gray-600'}"></div>
                    <div>
                      <p class="text-xs font-medium capitalize">${t.status}</p>
                      <p class="text-xs text-gray-500">${new Date(t.timestamp).toLocaleDateString('en-NG', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                    </div>
                  </div>`;
                }).join("")}
              </div>
            </div>` : ""}
            <div class="p-4 bg-black/20 border-t border-gray-800 flex justify-between items-center">
              <span class="text-xs text-gray-500">📍 ${o.customer?.city || ""}, ${o.customer?.country || ""}</span>
              <span class="font-bold">₦${(o.total || 0).toLocaleString()}</span>
            </div>
          </div>`;
                }).join("");
            });
        }

        function deleteMyOrder(orderId) {
            if (!currentUser) return showToast("Please login first.");
            if (!confirm("Are you sure you want to delete this order? This action cannot be undone.")) return;
            db.collection("orders").doc(orderId).get()
                .then(doc => {
                    if (!doc.exists) { showToast("Order not found."); return; }
                    const orderData = doc.data();
                    if (orderData.userEmail !== currentUser.email && orderData.userId !== currentUser.uid) {
                        showToast("You can only delete your own orders.");
                        return;
                    }
                    if (orderData.status !== "delivered") { showToast(
                            "Only delivered orders can be deleted."); return; }
                    return db.collection("orders").doc(orderId).delete();
                })
                .then(() => showToast("✅ Order deleted successfully"))
                .catch(err => showToast("Error: " + (err.message || "Could not delete order.")));
        }

        function showToast(msg) {
            const t = document.getElementById("toast"),
                m = document.getElementById("toast-message");
            if (!t || !m) return;
            m.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3500);
        }

        // ==================== INITIALIZATION ====================
        updateCartUI();
        window._currentView = "home";
        appRouter("home");
    </script>
</body>
</html>
